<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: white;
        }

        .navbar {
            background: #16213e;
            padding: 1rem 2rem;
            border-bottom: 2px solid #667eea;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: #667eea;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: white;
        }

        .container {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: #16213e;
            padding: 1.5rem;
            border-radius: 10px;
            text-align: center;
        }

        .stat-card h3 {
            color: #667eea;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
        }

        .sites-table {
            width: 100%;
            background: #16213e;
            border-radius: 10px;
            overflow: hidden;
        }

        .sites-table th,
        .sites-table td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid #333;
        }

        .sites-table th {
            background: #0f3460;
            color: #667eea;
        }

        .delete-btn {
            padding: 0.25rem 0.75rem;
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">🚀 WebHost Admin</div>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="/dashboard">Dashboard</a></li>
                <li><a href="/deploy">Deploy</a></li>
                <li><a href="/admin">Admin</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div class="stats-grid" id="stats">
            <div class="stat-card">
                <h3>Total Sites</h3>
                <div class="stat-value" id="totalSites">-</div>
            </div>
            <div class="stat-card">
                <h3>Running Sites</h3>
                <div class="stat-value" id="runningSites">-</div>
            </div>
            <div class="stat-card">
                <h3>Stopped Sites</h3>
                <div class="stat-value" id="stoppedSites">-</div>
            </div>
        </div>

        <h2 style="margin-bottom: 1rem;">All Sites</h2>
        <table class="sites-table">
            <thead>
                <tr><th>ID</th><th>Name</th><th>Domain</th><th>Port</th><th>Status</th><th>Created</th><th>Action</th></tr>
            </thead>
            <tbody id="sitesList"></tbody>
        </table>
    </div>

    <script>
        async function loadData() {
            await Promise.all([loadStats(), loadSites()]);
        }

        async function loadStats() {
            const response = await fetch('/api/stats');
            const stats = await response.json();
            document.getElementById('totalSites').textContent = stats.total_sites;
            document.getElementById('runningSites').textContent = stats.running_sites;
            document.getElementById('stoppedSites').textContent = stats.stopped_sites;
        }

        async function loadSites() {
            const response = await fetch('/api/sites');
            const data = await response.json();
            
            const tbody = document.getElementById('sitesList');
            tbody.innerHTML = data.sites.map(site => `
                <tr>
                    <td>${site.id}</td>
                    <td>${escapeHtml(site.name)}</td>
                    <td>${escapeHtml(site.domain)}</td>
                    <td>${site.port}</td>
                    <td style="color: ${site.status === 'running' ? '#4caf50' : '#f44336'}">${site.status}</td>
                    <td>${new Date(site.created_at).toLocaleDateString()}</td>
                    <td><button class="delete-btn" onclick="deleteSite('${site.id}')">Delete</button></td>
                </tr>
            `).join('');
        }

        async function deleteSite(siteId) {
            if (!confirm('Delete this site permanently?')) return;
            await fetch(`/api/site/${siteId}`, { method: 'DELETE' });
            loadData();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        loadData();
        setInterval(loadData, 5000);
    </script>
</body>
</html>
